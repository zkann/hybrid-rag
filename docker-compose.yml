# Local Postgres 17 with the pgvector extension preinstalled.
services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      # host 5433 to avoid colliding with a local Postgres on 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 3s
      timeout: 3s
      retries: 10
volumes:
  pgdata:
