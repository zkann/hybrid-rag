name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      # Deterministic unit tests: fusion math, chunking, and the eval metrics.
      # The full retrieval/answer eval needs a seeded DB + API keys, so it runs
      # locally via `make eval`, not in CI.
      - name: Run unit tests
        run: pytest -q
